# .github/workflows/reminder-cron.yml
# ─────────────────────────────────────────────────────────────────────────────
# Hourly cron job — calls the Vyayama Physio reminder endpoint.
#
# Why GitHub Actions?
#   Vercel Hobby plan only supports daily cron. GitHub Actions is free,
#   reliable, and runs every hour — required to catch 24h and 2h windows.
#
# Setup:
#   1. Add CRON_SECRET to GitHub: Repo → Settings → Secrets → Actions
#   2. Set the same CRON_SECRET in Vercel environment variables
#   3. Update APP_URL below if your domain changes
# ─────────────────────────────────────────────────────────────────────────────

name: Appointment Reminder Cron

on:
  schedule:
    - cron: "0 * * * *"   # Every hour at :00 — catches both 24h and 2h windows

  # Allow manual trigger from GitHub UI for testing
  workflow_dispatch:

jobs:
  send-reminders:
    name: Trigger Reminder API
    runs-on: ubuntu-latest
    timeout-minutes: 5         # Kill if hanging — cron should complete in <60s

    steps:
      - name: Call reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://crm-system-client-project.vercel.app
        run: |
          echo "Triggering reminder cron at $(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 90 \
            "$APP_URL/api/cron/reminders")

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response:    $HTTP_BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Cron endpoint returned $HTTP_CODE — marking run as failed"
            exit 1
          fi

          echo "✅ Reminder cron completed successfully"